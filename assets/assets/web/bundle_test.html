<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bundle Load Test</title>
    <style>
        body {
            font-family: monospace;
            padding: 20px;
            background: #000;
            color: #0f0;
        }
        .success { color: #0f0; }
        .error { color: #f00; }
        .warning { color: #ff0; }
    </style>
</head>
<body>
    <h1>Bundle Load Diagnostic</h1>
    <div id="results"></div>
    
    <script>
        const results = document.getElementById('results');
        
        function log(message, type = 'success') {
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            results.appendChild(div);
            console.log(message);
        }
        
        log('✅ HTML loaded', 'success');
        log('⏳ About to load bundle...', 'warning');
        
        // Override console.log to capture bundle logs
        const originalLog = console.log;
        console.log = function(...args) {
            originalLog.apply(console, args);
            if (args[0] && typeof args[0] === 'string') {
                if (args[0].includes('CORE BUNDLE')) {
                    log(`✅ FOUND: ${args[0]}`, 'success');
                }
                if (args[0].includes('🟢🟢🟢')) {
                    log(`✅ FOUND GREEN: ${args[0]}`, 'success');
                }
                if (args[0].includes('🔴🔴🔴')) {
                    log(`✅ FOUND RED: ${args[0]}`, 'success');
                }
                if (args[0].includes('Furniture Data Model')) {
                    log(`✅ FOUND: ${args[0]}`, 'success');
                }
            }
        };
        
        // Capture errors
        window.addEventListener('error', (e) => {
            log(`❌ ERROR: ${e.message} at ${e.filename}:${e.lineno}`, 'error');
        });
    </script>
    
    <!-- Load the bundle -->
    <script src="js/bundle_core_production.js?v=20260115_1720_NOCACHE"></script>
    
    <script>
        log('📊 Bundle script tag executed', 'success');
        log(`📦 window.FURNITURE_TYPES exists: ${typeof window.FURNITURE_TYPES !== 'undefined'}`, 
            typeof window.FURNITURE_TYPES !== 'undefined' ? 'success' : 'error');
        log(`📦 window.FurnitureIdleAnimationManager exists: ${typeof window.FurnitureIdleAnimationManager !== 'undefined'}`,
            typeof window.FurnitureIdleAnimationManager !== 'undefined' ? 'success' : 'error');
        
        setTimeout(() => {
            log('⏰ 2 seconds elapsed - checking again...', 'warning');
            log(`📦 FURNITURE_TYPES: ${typeof window.FURNITURE_TYPES}`, 
                typeof window.FURNITURE_TYPES !== 'undefined' ? 'success' : 'error');
            log(`📦 FurnitureIdleAnimationManager: ${typeof window.FurnitureIdleAnimationManager}`,
                typeof window.FurnitureIdleAnimationManager !== 'undefined' ? 'success' : 'error');
        }, 2000);
    </script>
</body>
</html>
