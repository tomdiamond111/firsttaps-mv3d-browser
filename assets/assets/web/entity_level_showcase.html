<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaming Levels Entity Showcase</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            overflow: hidden;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #controls {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #4CAF50;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            max-width: 400px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 15px;
            color: #4CAF50;
            text-shadow: 0 0 10px rgba(76, 175, 80, 0.5);
        }

        .level-info {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(76, 175, 80, 0.1);
            border-radius: 8px;
            border-left: 4px solid #4CAF50;
        }

        .level-title {
            font-size: 20px;
            font-weight: bold;
            color: #4CAF50;
            margin-bottom: 5px;
        }

        .level-subtitle {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 5px;
        }

        .level-threshold {
            font-size: 12px;
            color: #FFC107;
            font-weight: bold;
        }

        .entity-list {
            font-size: 12px;
            color: #ccc;
            margin-top: 8px;
            line-height: 1.6;
        }

        .entity-item {
            padding: 3px 0;
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 15px;
        }

        button {
            padding: 12px 20px;
            font-size: 14px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            box-shadow: 0 2px 8px rgba(76, 175, 80, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(76, 175, 80, 0.5);
        }

        button.active {
            background: linear-gradient(135deg, #FF9800, #F57C00);
            box-shadow: 0 4px 12px rgba(255, 152, 0, 0.5);
        }

        button.premium {
            background: linear-gradient(135deg, #9C27B0, #7B1FA2);
        }

        button.premium:hover {
            box-shadow: 0 4px 12px rgba(156, 39, 176, 0.5);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-buttons button {
            flex: 1;
            background: linear-gradient(135deg, #2196F3, #1976D2);
        }

        #status {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            font-size: 12px;
            color: #4CAF50;
        }

        .premium-badge {
            display: inline-block;
            background: #9C27B0;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: bold;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="controls">
        <h1>🎮 Gaming Levels Showcase</h1>
        
        <div class="level-info" id="level-info">
            <div class="level-title">Level 1 - Sky & Ground</div>
            <div class="level-subtitle">Free Level</div>
            <div class="level-threshold">Threshold: 0 points</div>
            <div class="entity-list" id="entity-list"></div>
        </div>

        <div class="button-group">
            <button onclick="showLevel(1)" class="active" id="btn-level-1">Level 1</button>
            <button onclick="showLevel(2)" id="btn-level-2">Level 2</button>
            <button onclick="showLevel(3)" id="btn-level-3">Level 3</button>
            <button onclick="showLevel(4)" class="premium" id="btn-level-4">Level 4 👑</button>
            <button onclick="showLevel(5)" class="premium" id="btn-level-5">Level 5 👑</button>
            <button onclick="showLevel(6)" class="premium" id="btn-level-6">Level 6 👑</button>
            <button onclick="showLevel(7)" class="premium" id="btn-level-7">Level 7 👑</button>
        </div>

        <div class="action-buttons">
            <button onclick="toggleViewMode()">Toggle View Mode</button>
            <button onclick="rotateView()">Rotate View</button>
        </div>
        
        <div style="margin-top: 15px; padding: 10px; background: rgba(255, 255, 255, 0.05); border-radius: 8px;" id="individual-controls">
            <label style="color: #4CAF50; font-weight: bold; display: block; margin-bottom: 8px;">Individual Entity View:</label>
            <select id="entity-selector" onchange="showIndividualEntity()" style="width: 100%; padding: 8px; border-radius: 4px; background: #2d2d3d; color: white; border: 1px solid #4CAF50;">
                <option value="">-- Select Entity --</option>
            </select>
        </div>

        <div id="status">Ready to showcase entities</div>
    </div>

    <!-- Three.js r153 -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.153.0/build/three.min.js"></script>

    <!-- Load entity modules -->
    <script src="js/modules/entities/baseInteractiveEntity.js"></script>
    <script src="js/modules/entities/entityTypes/entityCollectionGroup1.js"></script>
    <script src="js/modules/entities/entityTypes/entityCollectionGroup2.js"></script>
    <script src="js/modules/entities/entityTypes/entityCollectionGroupLevel2.js"></script>
    <script src="js/modules/entities/entityTypes/entityCollectionGroupLevel3.js"></script>
    <script src="js/modules/entities/entityTypes/entityCollectionGroupLevel4.js"></script>
    <script src="js/modules/entities/entityTypes/entityCollectionGroupLevel5.js"></script>
    <script src="js/modules/entities/entityTypes/entityCollectionGroupLevel6.js"></script>
    <script src="js/modules/entities/entityTypes/entityCollectionGroupLevel7.js"></script>

    <script>
        // Scene setup
        let scene, camera, renderer;
        let entities = [];
        let currentLevel = 1;
        let autoRotate = false;
        let viewMode = 'lineup'; // 'lineup' or 'individual'

        // Level configuration with updated thresholds and point values
        const levelConfig = {
            1: {
                title: 'Level 1 - Sky & Ground Creatures',
                subtitle: 'Free Level',
                threshold: 0,
                entities: [
                    { type: 'blimp', name: 'Blimp', points: 200, class: 'BlimpEntity' },
                    { type: 'airplane', name: 'Airplane', points: 300, class: 'AirplaneEntity' },
                    { type: 'dog', name: 'Dog', points: 400, class: 'DogEntity' },
                    { type: 'ufo', name: 'UFO', points: 500, class: 'UFOEntity' },
                    { type: 'bird', name: 'Bird', points: 600, class: 'BirdEntity' },
                    { type: 'frog', name: 'Frog', points: 600, class: 'FrogEntity' }
                ]
            },
            2: {
                title: 'Level 2 - Woodland Creatures',
                subtitle: 'Free Level',
                threshold: 10000,
                entities: [
                    { type: 'rabbit', name: 'Rabbit', points: 700, class: 'RabbitEntity' },
                    { type: 'fox', name: 'Fox', points: 800, class: 'FoxEntity' },
                    { type: 'owl', name: 'Owl', points: 900, class: 'OwlEntity' },
                    { type: 'deer', name: 'Deer', points: 1000, class: 'DeerEntity' },
                    { type: 'squirrel', name: 'Squirrel', points: 1200, class: 'SquirrelEntity' }
                ]
            },
            3: {
                title: 'Level 3 - Mythical Creatures',
                subtitle: 'Free Level',
                threshold: 20000,
                entities: [
                    { type: 'dragon', name: 'Dragon', points: 1400, class: 'DragonEntity' },
                    { type: 'phoenix', name: 'Phoenix', points: 1600, class: 'PhoenixEntity' },
                    { type: 'unicorn', name: 'Unicorn', points: 1800, class: 'UnicornEntity' },
                    { type: 'griffin', name: 'Griffin', points: 2000, class: 'GriffinEntity' },
                    { type: 'pegasus', name: 'Pegasus', points: 2200, class: 'PegasusEntity' }
                ]
            },
            4: {
                title: 'Level 4 - Insect Kingdom',
                subtitle: 'Premium Level',
                threshold: 35000,
                premium: true,
                entities: [
                    { type: 'spider', name: 'Black Spider', points: 500, class: 'BlackSpiderEntity' },
                    { type: 'butterfly', name: 'Butterfly', points: 600, class: 'ButterflyEntity' },
                    { type: 'mantis', name: 'Praying Mantis', points: 1000, class: 'PrayingMantisEntity' },
                    { type: 'ladybug', name: 'Ladybug', points: 1000, class: 'LadybugEntity' },
                    { type: 'housefly', name: 'Housefly', points: 2000, class: 'HouseflyEntity' }
                ]
            },
            5: {
                title: 'Level 5 - Energy Orbs',
                subtitle: 'Premium Level',
                threshold: 55000,
                premium: true,
                entities: [
                    { type: 'blue_orb', name: 'Blue Pulsing Orb', points: 1300, class: 'BluePulsingOrbEntity' },
                    { type: 'yellow_disc', name: 'Yellow Spinning Disc', points: 1500, class: 'YellowSpinningDiscEntity' },
                    { type: 'red_siren', name: 'Red Siren', points: 1700, class: 'RedSirenEntity' },
                    { type: 'dancing_orbs', name: 'Dancing Orbs', points: 2000, class: 'DancingOrbsEntity' },
                    { type: 'flashing_cube', name: 'Flashing Cube', points: 2200, class: 'FlashingCubeEntity' }
                ]
            },
            6: {
                title: 'Level 6 - Bouncing Balls Bonanza',
                subtitle: 'Premium Level',
                threshold: 80000,
                premium: true,
                entities: [
                    { type: 'red_ball', name: 'Red Bouncing Ball', points: 1500, class: 'RedBouncingBallEntity' },
                    { type: 'blue_sphere', name: 'Blue Sphere', points: 1800, class: 'BlueSphereEntity' },
                    { type: 'rainbow_ball', name: 'Rainbow Ball', points: 2400, class: 'RainbowBallEntity' },
                    { type: 'golden_orb', name: 'Golden Orb', points: 2100, class: 'GoldenOrbEntity' },
                    { type: 'mega_sphere', name: 'Mega Sphere', points: 2800, class: 'MegaSphereEntity' }
                ]
            },
            7: {
                title: 'Level 7 - UFO Invasion',
                subtitle: 'Premium Level',
                threshold: 120000,
                premium: true,
                entities: [
                    { type: 'scout_ufo', name: 'Scout UFO', points: 2000, class: 'ScoutUFOEntity' },
                    { type: 'warship_ufo', name: 'Warship UFO', points: 2400, class: 'WarshipUFOEntity' },
                    { type: 'mothership_ufo', name: 'Mothership UFO', points: 2800, class: 'MothershipUFOEntity' },
                    { type: 'cloaked_ufo', name: 'Cloaked UFO', points: 3200, class: 'CloakedUFOEntity' },
                    { type: 'swarm_commander', name: 'Swarm Commander', points: 4000, class: 'SwarmCommanderUFOEntity' }
                ]
            }
        };

        function init() {
            // Create scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xC0C0C0); // Light grey sky
            scene.fog = new THREE.Fog(0xC0C0C0, 50, 200);

            // Camera
            camera = new THREE.PerspectiveCamera(
                60,
                window.innerWidth / window.innerHeight,
                0.1,
                1000
            );
            camera.position.set(8, 8, 45); // Center camera on x=8, higher up, further back
            camera.lookAt(8, 3, 0); // Look at center of entities (x=8 is middle)

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
            directionalLight.position.set(10, 20, 10);
            directionalLight.castShadow = true;
            scene.add(directionalLight);

            const hemisphereLight = new THREE.HemisphereLight(0x87ceeb, 0x545454, 0.3);
            scene.add(hemisphereLight);

            // Ground plane
            const groundGeometry = new THREE.PlaneGeometry(100, 100);
            const groundMaterial = new THREE.MeshLambertMaterial({ 
                color: 0x505050, // Dark grey
                transparent: false,
                opacity: 1.0
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.receiveShadow = true;
            scene.add(ground);

            // Grid helper
            const gridHelper = new THREE.GridHelper(100, 20, 0x4CAF50, 0x2d2d3d);
            gridHelper.material.transparent = true;
            gridHelper.material.opacity = 0.3;
            scene.add(gridHelper);

            // Window resize
            window.addEventListener('resize', onWindowResize);

            // Start animation
            animate();

            // Show first level
            showLevel(1);
            
            // Populate entity selector
            populateEntitySelector();

            updateStatus('✅ Showcase initialized - Select a level');
        }

        function animate() {
            requestAnimationFrame(animate);

            // Update entities (except UFOs which are frozen for showcase)
            entities.forEach(entity => {
                if (entity && entity.update && entity.isActive !== false) {
                    entity.update();
                }
            });

            // Auto-rotate camera
            if (autoRotate) {
                camera.position.x = Math.sin(Date.now() * 0.0005) * 40;
                camera.position.z = Math.cos(Date.now() * 0.0005) * 40;
                camera.lookAt(0, 3, 0);
            }

            renderer.render(scene, camera);
        }

        function showLevel(level) {
            currentLevel = level;
            clearEntities();

            const config = levelConfig[level];
            if (!config) {
                updateStatus('❌ Level not found');
                return;
            }

            // Update info panel
            document.getElementById('level-info').innerHTML = `
                <div class="level-title">${config.title}${config.premium ? '<span class="premium-badge">PREMIUM</span>' : ''}</div>
                <div class="level-subtitle">${config.subtitle}</div>
                <div class="level-threshold">Threshold: ${config.threshold.toLocaleString()} points</div>
                <div class="entity-list" id="entity-list"></div>
            `;

            // Update entity list
            let entityListHTML = '';
            config.entities.forEach(entity => {
                entityListHTML += `<div class="entity-item">• ${entity.name}: <strong>${entity.points} pts</strong></div>`;
            });
            document.getElementById('entity-list').innerHTML = entityListHTML;

            // Update button states
            for (let i = 1; i <= 7; i++) {
                const btn = document.getElementById(`btn-level-${i}`);
                if (btn) {
                    if (i === level) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                }
            }

            // Spawn entities
            spawnLevelEntities(config);
            updateStatus(`✅ Showing ${config.entities.length} entities from ${config.title}`);
        }

        function spawnLevelEntities(config) {
            // Adjust spacing based on level - Level 7 UFOs need more space
            const spacing = (currentLevel === 7) ? 10 : 6;
            const startX = -(config.entities.length - 1) * spacing / 2;
            
            // Offset entities to the right to avoid control panel obstruction
            const xOffset = 8; // Shift everything right by 8 units

            config.entities.forEach((entityConfig, index) => {
                try {
                    const EntityClass = window[entityConfig.class];
                    if (!EntityClass) {
                        console.warn(`Entity class ${entityConfig.class} not found`);
                        return;
                    }

                    const entity = new EntityClass(scene);
                    
                    // Force position entities in a horizontal line at a good height for screenshots
                    // This overrides any random positioning done by the entity constructors
                    const xPos = startX + (index * spacing) + xOffset;
                    const yPos = 3;
                    const zPos = 0;
                    
                    if (entity.group) {
                        entity.group.position.set(xPos, yPos, zPos);
                        // Also reset any rotation for cleaner screenshots
                        entity.group.rotation.set(0, 0, 0);
                        // Make sure it's visible
                        entity.group.visible = true;
                    } else if (entity.mesh) {
                        entity.mesh.position.set(xPos, yPos, zPos);
                        entity.mesh.rotation.set(0, 0, 0);
                        entity.mesh.visible = true;
                    }

                    // Disable movement and updates for Level 7 UFOs to keep them in position
                    if (entityConfig.class.includes('UFO')) {
                        entity.movementPattern = 'showcase'; // Override movement
                        entity.direction = new THREE.Vector3(0, 0, 0); // Stop movement
                        entity.isActive = false; // Disable updates completely
                        if (entity.targetPosition) {
                            entity.targetPosition = new THREE.Vector3(xPos, yPos, zPos);
                        }
                        // Override the update method to prevent any movement
                        entity.update = function() {};
                        entity.updateMovement = function() {};
                    }
                    
                    // For Level 6 balls, override updateMovement to prevent movement but keep other updates
                    if (currentLevel === 6 && !entityConfig.class.includes('UFO')) {
                        if (entityConfig.name === 'Rainbow Ball') {
                            // Completely disable updates for Rainbow Ball to test visibility
                            entity.update = function() {};
                            entity.updateMovement = function() {};
                        } else {
                            const originalUpdate = entity.updateMovement;
                            entity.updateMovement = function(deltaTime) {
                                // Allow color changes and animations but freeze position
                                if (originalUpdate) {
                                    originalUpdate.call(this, deltaTime);
                                }
                                // Force position back to showcase location
                                if (this.group) {
                                    this.group.position.set(xPos, yPos, zPos);
                                }
                            };
                        }
                    }

                    entities.push(entity);
                    
                    // Debug info
                    const isVisible = entity.group ? entity.group.visible : entity.mesh?.visible;
                    const childCount = entity.group ? entity.group.children.length : 0;
                    const inScene = entity.group ? scene.children.includes(entity.group) : false;
                    
                    console.log(`✅ Spawned: ${entityConfig.name} at x=${xPos}, visible=${isVisible}, children=${childCount}, inScene=${inScene}`);
                    
                    // Fix Rainbow Ball rendering in showcase
                    if (entityConfig.name === 'Rainbow Ball' && entity.group) {
                        // Remove all existing children
                        while (entity.group.children.length > 0) {
                            entity.group.remove(entity.group.children[0]);
                        }
                        
                        // Add a simple rainbow-colored sphere for showcase
                        const geometry = new THREE.SphereGeometry(0.85, 32, 32);
                        const material = new THREE.MeshPhongMaterial({ 
                            color: 0xFF6B00, // Rainbow orange
                            shininess: 100,
                            emissive: 0xFF6B00,
                            emissiveIntensity: 0.2
                        });
                        const mesh = new THREE.Mesh(geometry, material);
                        entity.group.add(mesh);
                        
                        console.log('🌈 Rainbow Ball fixed with simple sphere');
                    }
                } catch (error) {
                    console.error(`❌ Error spawning ${entityConfig.name}:`, error.message);
                }
            });
        }

        function clearEntities() {
            entities.forEach((entity, index) => {
                try {
                    // Properly remove from scene and cleanup
                    if (entity && entity.group) {
                        // Dispose all geometries and materials first
                        entity.group.traverse((child) => {
                            if (child.geometry) {
                                child.geometry.dispose();
                            }
                            if (child.material) {
                                if (Array.isArray(child.material)) {
                                    child.material.forEach(mat => mat.dispose());
                                } else {
                                    child.material.dispose();
                                }
                            }
                        });
                        
                        // Remove from scene
                        scene.remove(entity.group);
                        
                    } else if (entity && entity.mesh) {
                        if (entity.mesh.geometry) entity.mesh.geometry.dispose();
                        if (entity.mesh.material) {
                            if (Array.isArray(entity.mesh.material)) {
                                entity.mesh.material.forEach(mat => mat.dispose());
                            } else {
                                entity.mesh.material.dispose();
                            }
                        }
                        scene.remove(entity.mesh);
                    }
                    
                    // Mark entity as inactive
                    if (entity) {
                        entity.isActive = false;
                    }
                    
                    // Call cleanup if it exists (Level 7 UFOs have this)
                    if (entity && entity.cleanup) {
                        entity.cleanup();
                    }
                    
                    // Call dispose if it exists
                    if (entity && entity.dispose) {
                        entity.dispose();
                    }
                } catch (error) {
                    console.error(`Error cleaning up entity:`, error);
                }
            });
            
            entities = [];
        }

        function rotateView() {
            autoRotate = !autoRotate;
            updateStatus(autoRotate ? '🔄 Auto-rotate enabled' : '⏸️ Auto-rotate disabled');
        }

        function toggleViewMode() {
            viewMode = viewMode === 'lineup' ? 'individual' : 'lineup';
            
            if (viewMode === 'individual') {
                document.getElementById('individual-controls').style.display = 'block';
                updateStatus('🔍 Individual view mode - Select an entity from dropdown');
            } else {
                document.getElementById('individual-controls').style.display = 'none';
                showLevel(currentLevel);
                updateStatus('📋 Lineup view mode');
            }
        }
        
        function populateEntitySelector() {
            const selector = document.getElementById('entity-selector');
            selector.innerHTML = '<option value="">-- Select Entity --</option>';
            
            Object.keys(levelConfig).forEach(level => {
                const config = levelConfig[level];
                config.entities.forEach((entity, index) => {
                    const option = document.createElement('option');
                    option.value = `${level}-${index}`;
                    option.textContent = `Level ${level}: ${entity.name}`;
                    selector.appendChild(option);
                });
            });
        }
        
        function showIndividualEntity() {
            const selector = document.getElementById('entity-selector');
            const value = selector.value;
            
            if (!value) return;
            
            const [level, index] = value.split('-').map(Number);
            const config = levelConfig[level];
            const entityConfig = config.entities[index];
            
            clearEntities();
            
            try {
                const EntityClass = window[entityConfig.class];
                if (!EntityClass) {
                    console.warn(`Entity class ${entityConfig.class} not found`);
                    return;
                }

                const entity = new EntityClass(scene);
                
                // Center the entity
                if (entity.group) {
                    entity.group.position.set(0, 3, 0);
                    entity.group.rotation.set(0, 0, 0);
                    entity.group.visible = true;
                } else if (entity.mesh) {
                    entity.mesh.position.set(0, 3, 0);
                    entity.mesh.rotation.set(0, 0, 0);
                    entity.mesh.visible = true;
                }

                // Disable movement for UFOs
                if (entityConfig.class.includes('UFO')) {
                    entity.movementPattern = 'showcase';
                    entity.direction = new THREE.Vector3(0, 0, 0);
                    entity.isActive = false;
                    if (entity.targetPosition) {
                        entity.targetPosition = new THREE.Vector3(0, 3, 0);
                    }
                    entity.update = function() {};
                    entity.updateMovement = function() {};
                }
                
                // Fix Rainbow Ball
                if (entityConfig.name === 'Rainbow Ball' && entity.group) {
                    while (entity.group.children.length > 0) {
                        entity.group.remove(entity.group.children[0]);
                    }
                    const geometry = new THREE.SphereGeometry(0.85, 32, 32);
                    const material = new THREE.MeshPhongMaterial({ 
                        color: 0xFF6B00,
                        shininess: 100,
                        emissive: 0xFF6B00,
                        emissiveIntensity: 0.2
                    });
                    const mesh = new THREE.Mesh(geometry, material);
                    entity.group.add(mesh);
                }

                entities.push(entity);
                
                // Zoom camera close to entity
                camera.position.set(0, 4, 12);
                camera.lookAt(0, 3, 0);
                
                updateStatus(`🔍 Viewing: ${entityConfig.name} (${entityConfig.points} pts)`);
            } catch (error) {
                console.error(`Error showing ${entityConfig.name}:`, error.message);
            }
        }
        
        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Initialize when page loads
        window.addEventListener('load', init);
    </script>
</body>
</html>
